aid: tolgee
url: https://raw.githubusercontent.com/api-evangelist/tolgee/refs/heads/main/apis.yml
name: Tolgee
kind: company
description: Tolgee is an open-source localization platform for translating web and
  mobile applications. It provides in-context translation, AI-assisted machine translation,
  framework SDKs, a CLI, and a REST API. Teams can self-host the open-source platform
  for free via Docker or use Tolgee Cloud (app.tolgee.io). The REST API exposes projects,
  localization keys, translations, languages, import/export, and screenshots, authenticated
  with a project API key sent in the X-API-Key header.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Localization
- i18n
- Translation
- Open Source
- Developer Tools
