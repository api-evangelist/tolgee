  - name: Glossaries
  - name: AI Playground
  - name: Tasks
  - name: Branching
  - name: Granular Permissions
- id: tolgee-cloud-advanced
  name: Cloud Advanced
  type: paid
  description: >-
    Higher-volume Cloud plan, approx EUR 499 / month billed annually, adding
    professional translation and translation memory management on top of
    Business features.
  entries:
  - label: Subscription
    name: subscription
    type: flat
    metric: month
    limit: -1
    timeFrame: month
    geo: global
    unit: 1
    price: ~EUR 499/month (annual)
    userMultiplied: false
  - label: Included Keys
    name: keys
    type: flat
    metric: keys
    limit: 20000
    timeFrame: month
    geo: global
    unit: 1
    price: included
    userMultiplied: false
  - label: Seats
    name: seats
    type: flat
    metric: seats
    limit: 20
    timeFrame: month
    geo: global
    unit: 1
    price: included
    userMultiplied: false
  elements:
