  - name: Professional Translation
  - name: Translation Memory Management
- id: tolgee-enterprise
  name: Enterprise
  type: enterprise
  description: >-
    Contact-sales tier (Cloud or licensed self-hosted) with premium support,
    single sign-on, dedicated Slack channel, account manager, team training,
